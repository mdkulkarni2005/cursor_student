name: CI

# Runs on every PR and every push to main. Never touches Cloud Run — this is the
# "does the code even work" gate that must pass before a preview or prod deploy runs.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma client must exist before typecheck/build touch @studentos/db.
      - run: pnpm --filter @studentos/db run generate

      - run: pnpm lint
      - run: pnpm check-types
      - run: pnpm build
