name: Preview Cleanup

# Runs when a PR closes (merged or abandoned) — deletes its 3 throwaway Cloud Run
# services and its Neon branch. Without this, every PR would leave paid resources
# running forever, silently eating into the $300 credit.
on:
  pull_request:
    types: [closed]

env:
  GCP_REGION: asia-southeast1
  PR: ${{ github.event.pull_request.number }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Delete preview Cloud Run services
        run: |
          for app in web admin recruiter; do
            gcloud run services delete "${app}-pr-${{ env.PR }}" \
              --region ${{ env.GCP_REGION }} --quiet || true
          done

      - name: Delete the PR's Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: pr-${{ env.PR }}
          api_key: ${{ secrets.NEON_API_KEY }}
